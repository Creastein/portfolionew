<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#050505" />
  <meta name="author" content="WELLI" />
  <meta name="keywords" content="Business Analyst, Web Developer, Portfolio, React, TypeScript, Frontend Developer, Jakarta, Indonesia" />
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://welli.my.id" />
  
  <!-- Primary Meta Tags -->
  <title>WELLI | Business Analyst & Developer Portfolio</title>
  <meta name="description" content="Business Analyst & Web Developer based in Jakarta. Turning business ideas into simple and useful web experiences. Specialized in React, TypeScript, and modern web technologies." />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://welli.my.id" />
  <meta property="og:title" content="WELLI | Business Analyst & Developer Portfolio" />
  <meta property="og:description" content="Business Analyst & Web Developer based in Jakarta. Turning business ideas into simple and useful web experiences." />
  <meta property="og:image" content="https://welli.my.id/images/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="WELLI Portfolio" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://welli.my.id" />
  <meta property="twitter:title" content="WELLI | Business Analyst & Developer Portfolio" />
  <meta property="twitter:description" content="Business Analyst & Web Developer based in Jakarta. Turning business ideas into simple and useful web experiences." />
  <meta property="twitter:image" content="https://welli.my.id/images/og-image.png" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#135bec', // Electric Blue
            secondary: '#92a4c9', // Muted Blue-Grey
            background: '#050505', // Deep Black
            surface: '#101622', // Dark Blue-Black
            'surface-light': '#1c2536',
          },
          animation: {
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
          },
        },
      },
    }
  </script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Mohave:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Rock+Salt&display=swap"
    rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <!-- Icons are handled by Lucide React in the app -->
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "framer-motion": "https://esm.sh/framer-motion@^12.31.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
</head>

<body class="bg-background text-white antialiased overflow-x-hidden selection:bg-primary selection:text-white">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
